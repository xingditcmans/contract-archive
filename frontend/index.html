<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合同归档管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f7fa; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    /* 加载动画 — Vue 应用加载前显示 */
    .loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; }
    .loader span { display: inline-block; width: 10px; height: 10px; margin: 0 4px; border-radius: 50%; background: #409eff; animation: bounce 1.4s infinite ease-in-out both; }
    .loader span:nth-child(1) { animation-delay: -0.32s; }
    .loader span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <!-- 零 JS 框架外壳 — 仅一个 iframe，绝不操作焦点 -->
  <iframe src="/app.html" title="合同归档管理系统"></iframe>
</body>
</html>
